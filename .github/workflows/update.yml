name: Update Samsung Price

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0-6 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run script
        run: python main.py

      - name: Commit price.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add price.json
          git commit -m "Update price.json" || echo "No changes"
          git push
